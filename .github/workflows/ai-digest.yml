name: AI Digest

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      slot:
        description: "Digest slot"
        required: true
        type: choice
        options:
          - AM
          - PM
          - Evening
      email:
        description: "Send email"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: ai-digest
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run digest
        env:
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          TIMEZONE: ${{ secrets.TIMEZONE }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SLOT="${{ inputs.slot }}"
            if [ "${{ inputs.email }}" = "true" ]; then
              python ai_digest_agent/scripts/run_scheduled.py --slot "$SLOT" --mode brief --email
            else
              python ai_digest_agent/scripts/run_scheduled.py --slot "$SLOT" --mode brief
            fi
          else
            python ai_digest_agent/scripts/run_if_due.py --timezone "${TIMEZONE:-America/Chicago}" --mode brief --email
          fi

      - name: Commit and push digests
        run: |
          if git status --porcelain | grep -q "^ M\|^??"; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add digests/archive
            git commit -m "chore(digest): update digests" || true
            git push
          else
            echo "No changes to commit."
          fi
