name: AI Digest

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      slot:
        description: "Digest slot"
        required: true
        type: choice
        options:
          - AM
          - PM
          - Evening
      email:
        description: "Send email"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: ai-digest
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run digest
        env:
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          TIMEZONE: ${{ secrets.TIMEZONE }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          missing=0
          for k in OPENAI_BASE_URL OPENAI_API_KEY; do
            if [ -z "${!k}" ]; then
              echo "Missing required GitHub secret/env: $k"
              missing=1
            fi
          done
          if [ "$missing" = "1" ]; then
            echo "Set these in GitHub -> Settings -> Secrets and variables -> Actions"
            exit 1
          fi

          # At least one search provider is required
          if [ -z "${SERPAPI_API_KEY}" ] && [ -z "${TAVILY_API_KEY}" ]; then
            echo "At least one of SERPAPI_API_KEY or TAVILY_API_KEY must be set"
            exit 1
          fi

          if [ -z "${TIMEZONE}" ]; then
            TIMEZONE="America/Chicago"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SLOT="${{ inputs.slot }}"
            if [ "${{ inputs.email }}" = "true" ]; then
              python ai_digest_agent/scripts/run_scheduled.py --slot "$SLOT" --mode brief --email
            else
              python ai_digest_agent/scripts/run_scheduled.py --slot "$SLOT" --mode brief
            fi
          else
            python ai_digest_agent/scripts/run_if_due.py --timezone "${TIMEZONE:-America/Chicago}" --mode brief --email --slo-minutes 15 --max-backfill-hours 14 --max-delivery-minutes-default 90 --max-delivery-minutes-evening 60
          fi

      - name: Evaluate schedule SLO
        if: always()
        id: monitor
        run: |
          out=$(python ai_digest_agent/scripts/evaluate_monitor.py)
          echo "$out"
          alerts=$(echo "$out" | awk -F= '/^alerts=/{print $2}')
          if [ -z "$alerts" ]; then alerts=0; fi
          echo "alerts=$alerts" >> "$GITHUB_OUTPUT"

      - name: Create issue for missed/late digest
        if: always() && steps.monitor.outputs.alerts != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'ai_digest_agent/output/monitor.json';
            const payload = fs.existsSync(path) ? JSON.parse(fs.readFileSync(path, 'utf8')) : { alerts: [{ type: 'monitor_missing' }] };
            const date = payload.date || 'unknown-date';
            const slot = payload.slot || 'unknown-slot';
            const drift = payload.drift_minutes != null ? `${payload.drift_minutes}m` : 'unknown';
            const title = `Digest scheduling alert: ${date} ${slot} (drift ${drift})`;
            const body = [
              'An automated monitor detected a missed/late digest run.',
              '',
              '```json',
              JSON.stringify(payload, null, 2),
              '```',
              '',
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
            });

      - name: Upload agent logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-digest-output
          path: ai_digest_agent/output/

      - name: Commit and push digests
        if: always()
        run: |
          if git status --porcelain | grep -q "^ M\|^??"; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add digests/archive
            git commit -m "chore(digest): update digests" || true
            git push
          else
            echo "No changes to commit."
          fi
