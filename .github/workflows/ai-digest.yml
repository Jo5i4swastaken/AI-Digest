name: AI Digest

on:
  schedule:
    # Run at the 3 digest times in America/Chicago, covering both CDT and CST:
    #   8 AM CDT=13 UTC / CST=14 UTC
    #   2 PM CDT=19 UTC / CST=20 UTC
    #   8 PM CDT=01 UTC / CST=02 UTC
    - cron: "0 1,2,13,14,19,20 * * *"
  workflow_dispatch:
    inputs:
      slot:
        description: "Digest slot"
        required: true
        type: choice
        options:
          - AM
          - PM
          - Evening
      email:
        description: "Send email"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: ai-digest
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run digest
        env:
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          TIMEZONE: ${{ secrets.TIMEZONE }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          missing=0
          for k in OPENAI_BASE_URL OPENAI_API_KEY; do
            if [ -z "${!k}" ]; then
              echo "Missing required GitHub secret/env: $k"
              missing=1
            fi
          done
          if [ "$missing" = "1" ]; then
            echo "Set these in GitHub -> Settings -> Secrets and variables -> Actions"
            exit 1
          fi

          # At least one search provider is required
          if [ -z "${SERPAPI_API_KEY}" ] && [ -z "${TAVILY_API_KEY}" ]; then
            echo "At least one of SERPAPI_API_KEY or TAVILY_API_KEY must be set"
            exit 1
          fi

          if [ -z "${TIMEZONE}" ]; then
            TIMEZONE="America/Chicago"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SLOT="${{ inputs.slot }}"
            if [ "${{ inputs.email }}" = "true" ]; then
              python ai_digest_agent/scripts/run_scheduled.py --slot "$SLOT" --mode brief --email
            else
              python ai_digest_agent/scripts/run_scheduled.py --slot "$SLOT" --mode brief
            fi
          else
            python ai_digest_agent/scripts/run_if_due.py --timezone "${TIMEZONE:-America/Chicago}" --mode brief --email
          fi

      - name: Upload agent logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-digest-output
          path: ai_digest_agent/output/

      - name: Commit and push digests
        run: |
          if git status --porcelain | grep -q "^ M\|^??"; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add digests/archive
            git commit -m "chore(digest): update digests" || true
            git push
          else
            echo "No changes to commit."
          fi
